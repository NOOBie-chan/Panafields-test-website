<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Panafields</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap');
        :root {
            --primary: #C583FF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0814 0%, #1a1433 100%);
            color: #f0e6ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.06;
            pointer-events: none;
        }
        .container {
            text-align: center;
            z-index: 10;
            max-width: 680px;
            padding: 2rem;
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 13.5rem;
            font-weight: 600;
            line-height: 0.85;
            color: transparent;
            -webkit-text-stroke: 2.5px var(--primary);
            text-shadow: 0 0 60px rgba(197, 131, 255, 0.35);
            margin-bottom: 10px;
            user-select: none;
            letter-spacing: -12px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 1.32rem;
            color: #d4c2f0;
            margin-bottom: 2.8rem;
            line-height: 1.55;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: #0f0a1f;
            font-weight: 600;
            padding: 17px 48px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.08rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 35px rgba(197, 131, 255, 0.35);
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(197, 131, 255, 0.5);
            background: #d9a5ff;
        }
        .footer {
            margin-top: 5rem;
            font-size: 0.95rem;
            color: #8a6eb8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
       
        <h1 class="title">Page Not Found</h1>
       
        <p class="subtitle">
            The resource you are looking for could not be located within our research database.
        </p>
        <a href="index.html" class="btn">Return to Homepage</a>
        <div class="footer">
            © 2026 Panafields • Precision Research &amp; Intelligence
        </div>
    </div>
</body>
</html>
